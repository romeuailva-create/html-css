<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Vídeos legais</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 vídeos por linha */
      gap: 20px;
      justify-items: center;
      margin-top: 30px;
    }

    .videos video {
      width: 300px;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Vídeos legais para assistir</h1>
  <div class="videos">
    <a href="video1/index.html"><video src="midias/backgrounds.mp4" controls></video></a>
    <a href="video2/index.html"><video src="midias/curtacarta (1).mp4" controls></video></a>
    <a href="video3/index.html"><video src="midias/luta.mp4" controls></video></a>
    <a href="video4/index.html"><video src="midias/videoplayback.mp4" controls></video></a>
  </div>
</body>
</html>
