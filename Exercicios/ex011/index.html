<!DOCTYPE html>
<html lang="pt-br">
<head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Midias em HTML5</title>
</head>
<body>
      <h1>Imagem dinâmica</h1>
      <p>tente abrir esse site  em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
      
      <picture>
              <source media="(max-width: 750px)" srcset="imagens/letra-p.png" type="image/png">
              <source media="(max-width: 1050px)" srcset="imagens/letra-m.png" type="image/png">
              <img src="imagens/letra-g.png" alt="imagem flexivel">
      </picture>
      <h1>Reproduzindo Áudio</h1>
      <p>vamos aprender a reproduzir áudio em HTML5</p>
      <audio preload="metadata" autoplay controls loop>
            <source src="midia/Whirlpool - The Mini Vandals.mp3" type="audio/mpeg">
            <p>Infelizmente, seu navegador não suporta a reprodução de áudio. <a href="midia/Whirlpool - The Mini Vandals.mp3">clique aqui para baixar o arquivo MP3</a></p>
      </audio>
</body>
</html>
