<!DOCTYPE html>
<html lang="pt-br">
<head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Modelos de Caixas</title>
              <style>
                            h1 { /* h1 é um exemplo de box-Level */
                                          background-color: lightgray;

                                          height: 300px;
                                          width: 300px;

                                          border: 10px solid darkgreen;


                                          padding: 10px; /* top right bottom left */


                                          margin: 20px auto 40px auto; /* top right bottom left */
                                         

                                          outline: 5px dashed salmon; /* top right bottom left */

                            }


                            a {
                                          display: block;

                                          border: 10px solid red; /* top right bottom left */


                                          padding: 10px 10px 10px 10px; /* top right bottom left */
                            }
                                       
              </style>
</head>
<body>
      <h1>Exemplo de Caixa box-Level</h1>
      <p>Parágrafos também são exemplos de box-Level,mas os <a href="#">links são exemplos de inline-level</a>. vamos ver como tudo isso funciona.</p>        
</body>
</html>
