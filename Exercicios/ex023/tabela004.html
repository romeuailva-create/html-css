<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmes Favoritos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            
            min-height: 100vh;
            display: flex;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        h1 {

            padding: 30px 20px;
            
            color: white;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: grey;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            color: #2d3748;
            
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        tbody th {
            background: #0171e0;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #2d3748;
            border-right: 1px solid #074fad;
            vertical-align: top;
        }

        tbody td {
            padding: 15px;
            color: #4a5568;
            border-bottom: 1px solid #032d64;
        }

;
        

        tfoot th {

            
            color: white;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
        }

        tfoot td {
            
            color: white;
            padding: 18px 15px;
            font-weight: 600;
            font-size: 16px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
                padding: 20px;
            }

            thead th,
            tbody th,
            tbody td,
            tfoot th,
            tfoot td {
                padding: 10px 8px;
                font-size: 13px;
            }

            .container {
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Filmes Favoritos</h1>
        <table>
            <thead>
                <tr>
                    <th>Grupos</th>
                    <th>Nomes</th>
                    <th colspan="3">Filmes</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th rowspan="3">Mulheres</th>
                    <td>Ana Maria Santos</td>
                    <td>Alien</td>
                    <td>Rambo</td>
                    <td>Vingadores</td>
                </tr>
                <tr>
                    <td>Beatriz Souza</td>
                    <td>Hulk</td>
                    <td>Inception</td>
                    <td>Batman</td>
                </tr>
                <tr>
                    <td>Cláudia Melo</td>
                    <td>Oblivion</td>
                    <td>Matrix</td>
                    <td>Big Hero</td>
                </tr>
                <tr>
                    <th rowspan="3">Homens</th>
                    <td>Bruno Mendonça</td>
                    <td>Intocáveis</td>
                    <td>Amnésia</td>
                    <td>Gladiador</td>
                </tr>
                <tr>
                    <td>Daniel Lourenço</td>
                    <td>Wall-E</td>
                    <td>Oldboy</td>
                    <td>Dangal</td>
                </tr>
                <tr>
                    <td>Fabiano Mota</td>
                    <td>Star Wars V</td>
                    <td>Taxi Driver</td>
                    <td>Toy Story</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    
                </tr>
            </tfoot>
        </table>
    </div>
</body>
</html>
