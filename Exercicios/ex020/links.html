<!DOCTYPE html>
<html lang="pt-br">
<head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Linkst</title>
              <style>
                     body {
                                   font-family: Arial, Helvetica, sans-serif;
                     } 

                     a {
                                   color: red;
                                   text-decoration: none;
                                   font-weight: bold;
                                  
                     }  

                     a:visited {
                                   color: rgb(150, 5, 48);
                     } 

                     a:hover {
                                   color: black;
                                   text-decoration: underline;
                     }  

                     a:active {
                                   color: yellow;
                     }
                     
                     a::before {
                                   content: "  → ";
                                   
                     }

                     a::after {
                                   content: "  →";
                                   text-decoration: none;
                                   font-weight: normal;
                                   color: darkslategray;
                     }
                     .especial {
                                   background-color: rgb(245, 106, 191);
                     }
                     .especial::before {
                                   content: "  →";
                     }
                     .especial::after {
                                   content: "  ←";
                     }
                                   
              </style>
</head>
<body>
      <h1>Personalizando Links</h1> 
      <ul>
              <li><a href="https://github.com/romeuailva-create" target="_blank">Repositório github</a></li>
              <li><a href="https://www.youtube.com/channel/UCJr4i86x1l1Y9XQZQZQZQZQ" target="_blank">Canal do youtube</a></li>
              <li><a href="https://www.cursoemvideo.com" class="especial">Site do cursoemvideo</a></li>
      </ul>       
</body>
</html>
